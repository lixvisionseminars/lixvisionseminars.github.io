- title: "Efficiently Reconstructing Dynamic Scenes One D4RT at a Time"
  authors: <a href="#">Guillaume Le Moing</a>
  date: 26-02-2026
  year: 2026
  thumbnail: /assets/talks/dart.png
  pdf: https://arxiv.org/abs/2512.08924
  website: https://d4rt-paper.github.io
  abstract: "Traditional approaches to 4D scene reconstruction often rely on computationally heavy iterative optimization or fragmented pipelines, piecing together separate models for depth, motion, and camera estimation. In this talk, we introduce D4RT (Dynamic 4D Reconstruction and Tracking), a powerful feedforward model that unifies these tasks into a single, scalable architecture. We will explore D4RT’s core innovation: a lightweight decoding mechanism paired with a robust video encoder, allowing it to independently query the 3D position of any pixel across space and time. We will also discuss the key design choices that enable D4RT to achieve state-of-the-art performance across reconstruction, tracking, and camera benchmarks. Finally, we will showcase its capabilities through qualitative results and baseline comparisons, before concluding with a discussion of current limitations and future directions."
  register:
  bio: "Guillaume Le Moing is a Research Scientist at Google DeepMind in Paris. He completed his PhD at Willow (Inria Paris) with Cordelia Schmid and Jean Ponce where his research focused on future video prediction (CCVS, WALDO) and motion understanding (DOT). Since joining DeepMind, he has worked on video foundation models (4DS & SciVid) and 4D vision (D4RT)."
  location: Grace Hopper Room, 2:00 PM

- title: "Powering Robot Foundation Models with 3D Spatial Intelligence"
  authors: <a href="#">Shizhe Chen</a>
  date: 19-03-2026
  year: 2026
  thumbnail: /assets/talks/shizhe.png
  website: https://cshizhe.github.io
  abstract: "As foundation models evolve from processing static Internet data to interacting with the complex, physical world, the need for deep 3D spatial intelligence has never been more critical.  In this talk, I will present our recent works that integrate 3D structural priors into the perception, decision-making, and planning cycles of robots. First, I will discuss 3D memories in object-goal navigation. We propose the FOM-Nav model that enhances existing VLM-based navigation models by building a compact, 3D-aware representation from image sequences. This approach improves both navigation efficiency and interpretability through explicit spatial structure.  Second, I will move from navigation to manipulation, introducing a new Vision-Language-Action model that incorporates 3D perception. By enabling dense interaction between point clouds and actions during action prediction, we achieve more precise and robust physical control.  Finally, I will explore the role of 3D generation in long-term planning. We demonstrate how generative models can imagine unseen environments to guide active 3D mapping, and propose an efficient spatial representation to estimate coverage gains and optimize long-term trajectory planning.  Together, these works suggest that the future of general-purpose robotics lies in models that do not just see the world, but understand, reason about, and imagine its 3D structure to act more effectively."
  register: https://docs.google.com/spreadsheets/d/1LesLZnkBfh5GFv5OZV5VAeb7FbMewthCtPuE_sb4Zms/edit?gid=0#gid=0
  bio: "Shizhe Chen is a research scientist at the WILLOW team at Inria Paris. She received her PhD degree from Renmin University of China in 2020, and then completed a two-year postdoc fellowship at Inria Paris with Dr. Ivan Laptev and Dr. Cordelia Schmid. Shizhe's research focuses on vision-and-language and embodied AI. She has published over 40 peer-reviewed papers at leading conferences and regularly serves as an Area Chair for premier venues such as CVPR, ICCV, ECCV, NeurIPS, ICML and ICLR."
  location: Grace Hopper Room, 2:00 PM